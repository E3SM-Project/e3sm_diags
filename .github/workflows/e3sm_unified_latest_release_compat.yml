name: E3SM Unified Advisory Compatibility

on:
  workflow_dispatch:

env:
  CANCEL_OTHERS: false
  PATHS_IGNORE: '["**/README.md", "**/docs/**", "**/examples/**", "**/misc/**", "**/.vscode/**", "**/.github/pull_request_template.md", "**/.github/ISSUE_TEMPLATE"]'

jobs:
  e3sm-unified-latest-released-compat:
    name: E3SM Unified Latest Release Advisory Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@master
        with:
          cancel_others: ${{ env.CANCEL_OTHERS }}
          paths_ignore: ${{ env.PATHS_IGNORE }}

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        uses: actions/checkout@v3

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        id: generate_unified_compat_env
        name: Generate E3SM Unified Compat Env
        run: |
          mkdir -p .github/generated
          python tests/integration/generate_unified_compat_env.py \
            --repodata-url https://conda.anaconda.org/conda-forge/linux-64/repodata.json.bz2 \
            --base-env-file conda-env/ci.yml \
            --output .github/generated/e3sm-unified-latest-released-compat.yml \
            --metadata-output .github/generated/e3sm-unified-latest-released-compat.json
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          metadata_path = Path(
              ".github/generated/e3sm-unified-latest-released-compat.json"
          )
          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          print(f"env_hash={metadata['env_hash']}")
          print(f"package_version={metadata['version']}")
          print(f"python_version={metadata['python_version']}")
          PY

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        name: Cache Conda
        uses: actions/cache@v3
        env:
          CACHE_NUMBER: 0
        with:
          path: ~/conda_pkgs_dir
          key: ${{ runner.os }}-e3sm-unified-latest-released-conda-${{ env.CACHE_NUMBER }}-${{ steps.generate_unified_compat_env.outputs.env_hash }}
          restore-keys: |
            ${{ runner.os }}-e3sm-unified-latest-released-conda-${{ env.CACHE_NUMBER }}-

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        name: Set up Compat Conda Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: "e3sm_unified_latest_released_compat"
          environment-file: .github/generated/e3sm-unified-latest-released-compat.yml
          miniforge-variant: Miniforge3
          miniforge-version: latest
          channel-priority: strict
          auto-update-conda: true
          use-only-tar-bz2: true
          python-version: ${{ steps.generate_unified_compat_env.outputs.python_version }}
          conda-remove-defaults: true

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        name: Install e3sm_diags
        run: |
          python -m pip install --no-build-isolation --no-deps .

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        name: Check compat conda env
        run: |
          conda list
          conda info

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        name: Run Advisory Targeted Image Compatibility Checks Against E3SM Unified Latest Release
        env:
          E3SM_UNIFIED_VERSION: ${{ steps.generate_unified_compat_env.outputs.package_version }}
          IMAGE_REGRESSION_ARTIFACT_DIR: .github/generated/e3sm-unified-latest-released-artifacts
          IMAGE_REGRESSION_TOLERANCE_PROFILE: e3sm_unified_latest_released_compat
          MPLCONFIGDIR: /tmp/mpl-e3sm-diags-e3sm-unified-latest-released
        run: pytest tests/integration/test_plot_image_regressions.py -m image_regression

      - if: ${{ always() && steps.skip_check.outputs.should_skip != 'true' }}
        name: Upload Compat Metadata
        uses: actions/upload-artifact@v4
        with:
          name: e3sm-unified-latest-released-compat-metadata
          path: .github/generated/e3sm-unified-latest-released-compat.json

      - if: ${{ failure() && steps.skip_check.outputs.should_skip != 'true' }}
        name: Upload Compat Image Regression Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e3sm-unified-latest-released-compat-image-regression-artifacts
          path: .github/generated/e3sm-unified-latest-released-artifacts
          if-no-files-found: ignore
